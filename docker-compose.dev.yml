version: "3.8"
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: umg_frontend_dev
    environment:
      - CHOKIDAR_USEPOLLING=true   # en algunas plataformas con volúmenes
      - NODE_ENV=development
      - PORT=3000
      - REACT_DEV_URL=http://localhost:3000
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules   # evita que node_modules del host pis e el del contenedor
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true